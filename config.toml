title = "NUGAWIKI"
description = "기록되지 않은 것은 기억되지 않는다"
base_url = "https://wiki.nugabox.com"
default_language = "ko"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["svg", "jpg", "jpeg", "png", "gif", "webp"]

[highlight]
enabled = true
theme = "atom-one-dark"
use_cdn = true

[search]
enabled = true
format = "fuse_json"
fields = ["title", "content"]
filename = "search.json"

[pagination]
enabled = true
per_page = 20

[[taxonomies]]
name = "categories"
feed = true
paginate_by = 20

[[taxonomies]]
name = "tags"
feed = true
paginate_by = 20

[sitemap]
enabled = true

[robots]
enabled = true

[feeds]
enabled = true
type = "rss"
limit = 10

[og]
default_image = "/nugawiki_meta.jpg"
type = "article"
twitter_card = "summary_large_image"

[markdown]
safe = false
lazy_loading = true
heading_ids = true
