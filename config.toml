title = "NUGAWIKI"
description = "기록되지 않은 것은 기억되지 않는다"
base_url = "https://wiki.nugabox.com"
default_language = "ko"

[plugins]
processors = ["markdown"]

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

[highlight]
enabled = true
mode = "client"
theme = "atom-one-dark"
use_cdn = true

[[taxonomies]]
name = "categories"
feed = true

[[taxonomies]]
name = "tags"
feed = true

[sitemap]
enabled = true

[feeds]
enabled = true
type = "rss"
limit = 10

[search]
enabled = true
format = "fuse_json"

# =============================================================================
# OpenGraph & Twitter Cards (recommended for social sharing)
# =============================================================================

[og]
type = "article"
twitter_card = "summary_large_image"

# =============================================================================
# Markdown (commonly customized)
# =============================================================================

[markdown]
emoji = true
task_lists = true
definition_lists = true
footnotes = true
mermaid = false        # Render ```mermaid code blocks as diagrams (loads mermaid.js)
math = false           # Inline ($...$) and block ($$...$$) math (loads math_engine)
math_engine = "katex"  # "katex" or "mathjax"

