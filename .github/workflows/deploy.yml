name: Deploy NUGAWIKI

on:
  push:
    branches:
      - main

concurrency:
  group: nugawiki-deploy
  cancel-in-progress: false

env:
  DEPLOY_DIR: /volume1/Develop/Sites/nugawiki
  DOCKER_BUILDKIT: "1"
  COMPOSE_DOCKER_CLI_BUILD: "1"

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64, nugacloud]
    timeout-minutes: 20

    steps:
      - name: Deploy on Production Server
        id: deploy
        env:
          # git이 자격증명/호스트 키 확인 프롬프트에서 무한 대기하지 않고
          # 바로 실패하도록 강제한다(원인 불명 행 방지).
          GIT_TERMINAL_PROMPT: "0"
          GIT_SSH_COMMAND: "ssh -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o ConnectTimeout=15"
        run: |
          set -euo pipefail

          DI="/tmp/nugawiki-deploy-${GITHUB_RUN_ID}.txt"
          echo "DEPLOY_INFO_FILE=$DI" >> "$GITHUB_ENV"

          COMPOSE="docker compose"
          DEPLOY_DIR="${{ env.DEPLOY_DIR }}"
          LAST_SHA_FILE="${DEPLOY_DIR}/.deploy-last-sha"
          step_time() { echo "[timing] $1 — $(date -u '+%Y-%m-%d %H:%M:%S UTC')"; }

          cd "$DEPLOY_DIR"

          step_time "git sync start"
          git fetch origin main
          git reset --hard origin/main
          CUR="$(git rev-parse HEAD)"
          step_time "git sync done"

          PREV=""
          [ -f "$LAST_SHA_FILE" ] && PREV="$(cat "$LAST_SHA_FILE")"

          # Returns 0 (true) if any of the given paths differ between PREV and CUR.
          # With no PREV (first deploy) always returns true.
          changed() {
            [ -z "$PREV" ] && return 0
            [ "$PREV" = "$CUR" ] && return 1
            ! git diff --quiet "$PREV" "$CUR" -- "$@"
          }

          # ── Selective rebuild ──────────────────────────────────────────
          # builder 이미지에 baked-in되는 것들(코드/템플릿/설정/콘텐츠 베이스라인)이
          # 바뀌면 재빌드. Notion 콘텐츠 자체는 builder가 내부적으로 주기 재동기화
          # 하므로 git push만으로는 별도 처리가 필요 없다.
          REBUILD=0
          if changed docker-compose.yml Dockerfile.builder scripts templates static config.toml archetypes content package.json package-lock.json; then
            REBUILD=1
          fi

          # nginx.conf는 볼륨 마운트 → 재빌드 대신 reload만. 첫 배포(PREV
          # 없음)는 컨테이너가 지금 막 최신 설정으로 새로 뜨는 것이므로
          # reload 자체가 무의미 — 대상에서 제외한다.
          NGINX_RELOAD=0
          [ -n "$PREV" ] && changed nginx.conf && NGINX_RELOAD=1
          # ──────────────────────────────────────────────────────────────

          if [ "$REBUILD" -eq 1 ]; then
            step_time "build start: builder"
            export COMPOSE_HTTP_TIMEOUT=1200
            $COMPOSE build builder
            step_time "build done"
          else
            echo "No image rebuild needed"
          fi

          step_time "docker compose up start"
          $COMPOSE up -d
          step_time "docker compose up done"

          # Reload nginx config if it changed (up -d doesn't reload config).
          # nginx가 막 (재)기동됐을 수 있으니 pid 파일이 나타날 때까지 잠깐
          # 기다리고, 그래도 reload가 실패하면 배포 자체는 실패시키지 않는다
          # (컨테이너는 이미 최신 설정으로 기동된 상태이므로 reload는 부가
          # 신호일 뿐이다).
          if [ "$NGINX_RELOAD" -eq 1 ]; then
            for i in 1 2 3 4 5; do
              $COMPOSE exec -T wiki test -f /run/nginx.pid && break
              sleep 2
            done
            if $COMPOSE exec -T wiki nginx -s reload; then
              echo "nginx config reloaded"
            else
              echo "::warning::nginx reload 실패 - 컨테이너는 이미 최신 설정으로 기동되어 있어 무시함"
            fi
          fi

          step_time "container status"
          {
            echo "Timestamp (UTC): $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            echo "Commit: $CUR"
            echo "Previous deploy: ${PREV:-<none>}"
            echo "Rebuilt: $([ "$REBUILD" -eq 1 ] && echo builder || echo none)"
            echo "nginx reload: $([ "$NGINX_RELOAD" -eq 1 ] && echo yes || echo no)"
            echo ""
            $COMPOSE ps -a
          } > "$DI"

          echo "$CUR" > "$LAST_SHA_FILE"

      - name: Send Success Notification
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: "7758712361"
          GH_REPO: ${{ github.repository }}
          GH_REF: ${{ github.ref_name }}
          GH_SHA: ${{ github.sha }}
          DEPLOY_INFO_FILE: ${{ env.DEPLOY_INFO_FILE }}
        run: |
          set -e
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ]; then echo "TELEGRAM_BOT_TOKEN 없음 — 텔레그램 생략"; exit 0; fi
          INFO=""
          if [ -n "${DEPLOY_INFO_FILE:-}" ] && [ -f "$DEPLOY_INFO_FILE" ]; then INFO=$(cat "$DEPLOY_INFO_FILE"); fi
          export INFO GH_REPO GH_REF GH_SHA TELEGRAM_BOT_TOKEN TELEGRAM_CHAT_ID
          PYBIN="$(command -v python3 2>/dev/null || command -v python 2>/dev/null || true)"
          if [ -z "$PYBIN" ]; then echo "python 없음 — 텔레그램 생략"; exit 0; fi
          "$PYBIN" << 'PY'
          import json, os, urllib.request

          def send(text: str) -> None:
              token = os.environ["TELEGRAM_BOT_TOKEN"]
              chat = os.environ["TELEGRAM_CHAT_ID"]
              url = f"https://api.telegram.org/bot{token}/sendMessage"
              body = {"chat_id": chat, "text": text}
              req = urllib.request.Request(
                  url,
                  data=json.dumps(body, ensure_ascii=False).encode("utf-8"),
                  headers={"Content-Type": "application/json"},
                  method="POST",
              )
              with urllib.request.urlopen(req, timeout=45) as r:
                  r.read()

          info = os.environ.get("INFO", "").strip()
          if len(info) > 3500:
              info = info[:3500] + "\n…(이하 생략)"
          lines = [
              "✅ NUGAWIKI 배포 성공",
              "",
              f"저장소: {os.environ['GH_REPO']}",
              f"브랜치: {os.environ['GH_REF']}",
              f"커밋: {os.environ['GH_SHA']}",
              "",
              "배포 정보:",
              info if info else "(없음)",
          ]
          send("\n".join(lines))
          print("telegram: ok")
          PY

      - name: Send Failure Notification
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: "7758712361"
          GH_REPO: ${{ github.repository }}
          GH_REF: ${{ github.ref_name }}
          GH_SHA: ${{ github.sha }}
          DEPLOY_INFO_FILE: ${{ env.DEPLOY_INFO_FILE }}
        run: |
          set -e
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ]; then echo "TELEGRAM_BOT_TOKEN 없음 — 텔레그램 생략"; exit 0; fi
          INFO=""
          if [ -n "${DEPLOY_INFO_FILE:-}" ] && [ -f "$DEPLOY_INFO_FILE" ]; then INFO=$(cat "$DEPLOY_INFO_FILE"); fi
          export INFO GH_REPO GH_REF GH_SHA TELEGRAM_BOT_TOKEN TELEGRAM_CHAT_ID
          PYBIN="$(command -v python3 2>/dev/null || command -v python 2>/dev/null || true)"
          if [ -z "$PYBIN" ]; then echo "python 없음 — 텔레그램 생략"; exit 0; fi
          "$PYBIN" << 'PY'
          import json, os, urllib.request

          def send(text: str) -> None:
              token = os.environ["TELEGRAM_BOT_TOKEN"]
              chat = os.environ["TELEGRAM_CHAT_ID"]
              url = f"https://api.telegram.org/bot{token}/sendMessage"
              body = {"chat_id": chat, "text": text}
              req = urllib.request.Request(
                  url,
                  data=json.dumps(body, ensure_ascii=False).encode("utf-8"),
                  headers={"Content-Type": "application/json"},
                  method="POST",
              )
              with urllib.request.urlopen(req, timeout=45) as r:
                  r.read()

          info = os.environ.get("INFO", "").strip()
          if len(info) > 3500:
              info = info[:3500] + "\n…(이하 생략)"
          lines = [
              "❌ NUGAWIKI 배포 실패",
              "",
              f"저장소: {os.environ['GH_REPO']}",
              f"브랜치: {os.environ['GH_REF']}",
              f"커밋: {os.environ['GH_SHA']}",
          ]
          if info:
              lines += ["", "마지막으로 수집된 배포 정보:", info]
          send("\n".join(lines))
          print("telegram: failure notice sent")
          PY
