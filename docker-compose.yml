name: nugawiki

services:
  builder:
    build:
      context: .
      dockerfile: Dockerfile.builder
    image: nugawiki:builder
    container_name: nugawiki-builder
    restart: unless-stopped
    environment:
      NOTION_TOKEN: "${NOTION_TOKEN:-}"
      NOTION_DB_ID: "${NOTION_DB_ID:-}"
      SYNC_INTERVAL_SECONDS: "${SYNC_INTERVAL_SECONDS:-900}"
    volumes:
      - public_data:/site/public

  wiki:
    image: nginx:alpine
    container_name: nugawiki
    restart: unless-stopped
    depends_on:
      - builder
    ports:
      - "${PROD_PORT:-1729}:80"
    volumes:
      - public_data:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  public_data:
