server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 512;
    gzip_types text/plain text/css text/xml application/xml application/javascript application/json image/svg+xml;

    error_page 404 /404.html;

    location = /404.html {
        internal;
    }

    # 구 카테고리 폴더 URL(/os/slug/ 등) → /docs/slug/
    # 섹션 루트(/os/)는 Hwaro redirect_to(/categories/os/)가 처리.
    location ~ ^/(os|server|back-end|front-end|dev-ops|tech)/(.+)$ {
        return 301 /docs/$2;
    }

    # Hwaro emits one static file/directory per resource; cache
    # fingerprinted assets aggressively, keep HTML revalidated.
    location ~* \.(?:css|js|svg|woff2?|png|jpe?g|gif|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ $uri/index.html =404;
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }
}
